<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartiersatlas Düsseldorf 2024</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="map"></div>

    <div id="layer-control">
        <h3>Indikator</h3>
        <select id="layer-select"></select>
        <label class="toggle-row">
            <input type="checkbox" id="toggle-stadtteile">
            <span>Stadtteilgrenzen</span>
        </label>
        <label class="toggle-row">
            <input type="checkbox" id="toggle-labels" disabled>
            <span>Stadtteilnamen</span>
        </label>
        <button id="export-pdf" title="Karte als PDF exportieren">PDF Export</button>
        <button id="export-img" title="Karte als Bild exportieren (4:5, Instagram)">Bild Export</button>
    </div>

    <div id="legend"></div>

    <div id="footer">
        Datenquellen: Quartiersatlas 2024 – Landeshauptstadt Düsseldorf, Amt für Statistik und Wahlen |
        Sozialraumgrenzen: Open Data Düsseldorf (Datenlizenz Deutschland – Zero) |
        Kartendaten: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
